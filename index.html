<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <meta name="description" content="GIS-Toolbox.com is a free browser-based GIS and data prep toolkit for importing, transforming, visualizing, and exporting geospatial data.">
    <meta name="robots" content="index,follow">

    <meta property="og:title" content="GIS Toolbox — GIS & Data Tools">
    <meta property="og:description" content="Import, transform, visualize, and export Shapefile, GeoJSON, KML/KMZ, CSV, Excel, and more in your browser.">

    <meta name="theme-color" content="#1c1c1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GIS Toolbox">
    <link rel="apple-touch-icon" href="icons/PWAicon.png">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-ZTHRF9QMPV');
    </script>

    <!-- App CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/mobile.css">

</head>
<body>
    <div id="root"></div>

    <script type="module" src="/react/main.jsx"></script>

    <!-- Auto-reload when a newly installed service worker takes control -->
    <script>
        if ('serviceWorker' in navigator) {
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });
        }
    </script>
</body>
